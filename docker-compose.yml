services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghostai-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "--tries=1", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  trigger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghostai-trigger
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    command: >
      sh -c "npx prisma generate && npm run dev:trigger"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
  next_cache:
