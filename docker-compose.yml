services:
  db:
    image: postgres:16-alpine
    container_name: ghostai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ghost_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ghost_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghostai-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/ghost_ai?schema=public}
      NEXT_TELEMETRY_DISABLED: "1"
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  trigger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghostai-trigger
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/ghost_ai?schema=public}
      NEXT_TELEMETRY_DISABLED: "1"
    command: >
      sh -c "npx prisma generate && npm run dev:trigger"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  postgres_data:
  node_modules:
